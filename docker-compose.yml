services:
  postgres:
    image: postgres:16-alpine
    container_name: transmeet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transmeet
    ports:
      - "5432:5432"
    volumes:
      - transmeet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transmeet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  transmeet_pgdata:

version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 14 App Router
  - React 18
  - Tailwind CSS
  - shadcn/ui
  - Supabase Auth
  - TanStack Query
  - Zod
routes:
  - path: /
    file: apps/web/src/app/(marketing)/page.tsx
    auth_required: false
    description: Marketing home
  - path: /contact
    file: apps/web/src/app/(marketing)/contact/page.tsx
    auth_required: false
    description: Contact page with lead form
  - path: /login
    file: apps/web/src/app/(auth)/login/page.tsx
    auth_required: false
    description: User login
  - path: /register
    file: apps/web/src/app/(auth)/register/page.tsx
    auth_required: false
    description: Registration with email OTP
  - path: /register/verify
    file: apps/web/src/app/(auth)/register/verify/page.tsx
    auth_required: false
    description: OTP verification after signup
  - path: /admin/leads
    file: apps/web/src/app/(dashboard)/admin/leads/page.tsx
    auth_required: true
    description: Admin list of captured leads
  - path: /api/leads
    file: apps/web/src/app/api/leads/route.ts
    auth_required: false
    description: POST JSON lead payloads (contact, BTP, expediteur forms)
features:
  - name: Contact and lead form submission
    description: Public forms submit JSON to POST /api/leads via submitLead; persists lead and optional Resend email
    files:
      - apps/web/src/components/forms/api.ts
      - apps/web/src/components/forms/ContactForm.tsx
      - apps/web/src/app/api/leads/route.ts
      - apps/web/src/lib/leads/persistLead.ts
    entry_route: /contact
    user_interactions:
      - Open /contact page
      - Fill name, email, phone, subject, message fields
      - Submit form
      - See success message when lead is saved
    api_calls:
      - method: POST
        endpoint: /api/leads
    auth_required: false
  - name: Registration email OTP
    description: User enters email and profile data; Supabase sends OTP email; user verifies on /register/verify
    files:
      - apps/web/src/app/(auth)/register/PhoneSignupForm.tsx
      - apps/web/src/services/authService.ts
    entry_route: /register
    user_interactions:
      - Fill registration form with email and role
      - Submit to receive OTP email
      - Navigate to verify page and enter 6-digit code
    api_calls:
      - method: POST
        endpoint: Supabase Auth signInWithOtp (client SDK, not REST in app)
    auth_required: false
known_limitations:
  - issue: Some dashboard pages are placeholders or mock data
    location: apps/web/src/app/(dashboard)
    impact: Admin flows may not reflect full backend state
